<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Oswald:wght@200..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Work+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneSpec – Compare Phones</title>

    <style>
      body {
        font-family: "Work Sans", sans-serif;
        font-weight: 800;
      }

      nav a::before {
        content: "";
        display: block;
        height: 5px;
        background-color: #444;
        position: absolute;
        top: 0;
        left: 0;
        width: 0%;
        transition: width 9999ms ease-in-out;
      }

      nav a:hover::before {
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-dark m-0">
    <header style="background-color: #55d6aa">
      <div
        class="container-lg w-75 mx-auto d-flex justify-content-between align-items-center"
      >
        <h1 class="logo fs-4 mb-0 py-2">📱PhoneSpec</h1>

        <nav>
          <ul class="navbar-nav flex-row list-unstyled mb-0">
            <li class="nav-item position-relative pt-4 ms-5">
              <a
                href="#"
                class="nav-link text-uppercase fw-bold text-secondary p-0"
                style="font-size: 14px"
                >Home</a
              >
            </li>
            <li class="nav-item position-relative pt-4 ms-5">
              <a
                href="#"
                class="nav-link text-uppercase fw-bold text-secondary p-0"
                style="font-size: 14px"
                >Compare</a
              >
            </li>
            <li class="nav-item position-relative pt-4 ms-5">
              <a
                href="#"
                class="nav-link text-uppercase fw-bold text-secondary p-0"
                style="font-size: 14px"
                >Brands</a
              >
            </li>
            <li class="nav-item position-relative pt-4 ms-5">
              <a
                href="#"
                class="nav-link text-uppercase fw-bold text-secondary p-0"
                style="font-size: 14px"
                >Top Rated</a
              >
            </li>
            <li class="nav-item position-relative pt-4 ms-5">
              <a
                href="#"
                class="nav-link text-uppercase fw-bold text-secondary p-0"
                style="font-size: 14px"
                >Reviews</a
              >
            </li>
          </ul>
        </nav>
      </div>
      <div class="container py-5">
        <!-- Released Phones -->
        <h5 class="text-uppercase text-muted mb-3 fw-semibold">New Phones</h5>
        <div class="row g-4 mb-5">
          <div class="col-md-4">
            <img
              src="oppo.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover opacity-80"
              style="height: 200px"
              alt="Oppo find x9 ultra"
            />
            <h6 class="mt-3 mb-0">Oppo Find x9 Ultra</h6>
          </div>
          <div class="col-md-4">
            <img
              src="vivo.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover opacity-80"
              style="height: 200px"
              alt="vivo"
            />
            <h6 class="mt-3 mb-0">vivo x300 ultra</h6>
          </div>
          <div class="col-md-4">
            <img
              src="xiaomi.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover opacity-80"
              style="height: 200px"
              alt="xiaomi"
            />
            <h6 class="mt-3 mb-0">xiaomi</h6>
          </div>
        </div>

        <!-- Banner -->
        <div class="row mb-5">
          <div class="col">
            <img
              src="compare.jfif"
              class="w-100 object-fit-cover"
              style="height: 320px"
              alt="all three"
            />
          </div>
        </div>

        <!-- Top Rated -->
        <h5 class="text-uppercase text-muted mb-3 fw-semibold">Top Reviews</h5>
        <div class="row mb-5">
          <div class="col-md-3">
            <img
              src="samsung.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover"
              alt="s26"
              style="height: 200px"
            />
            <h6 class="mt-3 mb-0">Samsung s26</h6>
          </div>
          <div class="col-md-3">
            <img
              src="iphone.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover"
              alt="17"
              style="height: 200px"
            />
            <h6 class="mt-3 mb-0">iphone 17 ultra</h6>
          </div>
          <div class="col-md-3">
            <img
              src="honor.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover"
              alt="magic"
              style="height: 200px"
            />
            <h6 class="mt-3 mb-0">honor magic 8 pro</h6>
          </div>
          <div class="col-md-3">
            <img
              src="huawei.jfif"
              class="img-fluid rounded-5 w-100 object-fit-cover"
              alt="huawei"
              style="height: 200px"
            />
            <h6 class="mt-3 mb-0">Huawei 80 ultra</h6>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
